---
# In this example, the Deployer will install and configure Redis, MongoDB, Itential Platform
# and Itential Gateway4 in an Active/Standby environment.
# Custom Redis and MongoDB passwords will be used.
# TLS will be configured ON (default).
all:
  vars:
    # The Platform release must be defined.
    #  - valid values: 6, 6.0
    platform_release: 6

  children:
    redis_master:
      hosts:
        redis-data01.dc1.example.com:

    redis_replica:
      hosts:
        redis-data02.dc1.example.com:
        redis-data01.dc2.example.com:
        redis-data02.dc2.example.com:

    redis_sentinel:
      hosts:
        redis-sentinel01.dc1.example.com:
        redis-sentinel01.dc2.example.com:
        redis-sentinel01.dc3.example.com:

    redis_nodes:
      hosts:
        redis-data01.dc1.example.com:
        redis-data02.dc1.example.com:
        redis-data01.dc2.example.com:
        redis-data02.dc2.example.com:
        redis-sentinel01.dc1.example.com:
        redis-sentinel01.dc2.example.com:
        redis-sentinel01.dc3.example.com:
      vars:
        # The default Redis passwords are overridden.
        # NOTE: Using Ansible Vault or Hashicorp Vault for passwords is highly recommended.
        redis_user_admin_password: <redis-admin-password>
        redis_user_itential_password: <redis-itential-password>
        redis_user_repluser_password: <redis-repluser-password>
        redis_user_sentineladmin_password: <redis-sentineladmin-password>
        redis_user_sentineluser_password: <redis-sentineluser-password>
        redis_user_monitor_password: <redis-monitor-password>

    mongodb:
      hosts:
        mongodb-data01.dc1.example.com:
        mongodb-data02.dc1.example.com:
        mongodb-data01.dc2.example.com:
        mongodb-data02.dc2.example.com:

    mongodb_arbiter:
      hosts:
        mongodb-arbiter01.dc3.example.com:

    mongodb_nodes:
      hosts:
        mongodb-data01.dc1.example.com:
        mongodb-data02.dc1.example.com:
        mongodb-data01.dc2.example.com:
        mongodb-data02.dc2.example.com:
        mongodb-arbiter01.dc3.example.com:
      vars:
        # Enable replication between the MongoDB nodes.
        mongodb_replication_enabled: true

        # The default MongoDB passwords are overridden.
        # NOTE: Using Ansible Vault or Hashicorp Vault for passwords is highly recommended.
        mongodb_user_admin_password: <mongodb-admin-password>
        mongodb_user_itential_password: <mongodb-itential-password>

        # By default, TLS and cert uploads are enabled.
        # mongodb_tls_enabled: true
        # mongodb_tls_copy_certs: true

        # When uploading certs/keys, the source directory on the control node must be defined.
        mongodb_pki_src_dir: </path/to/certs/on/control/node>

        # The following TLS-related variables can be overridden.
        # mongodb_pki_base_dir: /etc/pki/mongodb
        # mongodb_pki_private_subdir: private
        # mongodb_pki_private_dir: "{{ mongodb_pki_base_dir }}/{{ mongodb_pki_private_subdir }}"
        # mongodb_tls_server_cert_file: "{{ inventory_hostname }}.pem"
        # mongodb_tls_ca_file: ca-bundle.crt
        # mongodb_auth_key_file: replica.key
        # mongodb_tls_cert_dest: "{{ mongodb_pki_base_dir }}/{{ mongodb_tls_server_cert_file }}"
        # mongodb_tls_ca_dest: "{{ mongodb_pki_base_dir }}/{{ mongodb_tls_ca_file }}"
        # mongodb_auth_key_dest: "{{ mongodb_pki_private_dir }}/{{ mongodb_auth_key_file }}"
        # mongodb_tls_cert_src: "{{ mongodb_pki_src_dir }}/{{ mongodb_tls_server_cert_file }}"
        # mongodb_tls_ca_src: "{{ mongodb_pki_src_dir }}/{{ mongodb_tls_ca_file }}"

    platform:
      hosts:
        itential-platform01.dc1.example.com:
        itential-platform02.dc1.example.com:
        itential-platform01.dc2.example.com:
        itential-platform02.dc2.example.com:
      vars:
        # The Platform encryption key must be defined.
        # It is an open64-length hex string, representing a 256-bit AES encryption key.
        #  - example command to generate key: 'openssl rand -hex 32'
        platform_encryption_key: <key>

        # The Platform packages to install must be defined.
        # NOTE: The Platform packages list varies depending on entitlement.
        platform_packages:
          - itential-platform-<version>.noarch.rpm

        # When uploading certs/keys, the source directories on the control node must be defined.
        platform_https_pki_src_dir: </path/to/platform/https/certs/on/control/node>
        platform_mongodb_pki_src_dir: </path/to/platform/mongodb/certs/on/control/node>

        # The default MongoDB username, database name are used and TLS is enabled.
        # platform_mongo_user: itential
        # platform_mongo_db_name: itential
        # platform_mongo_tls_enabled: true

        # The MongoDB password and URL are overridden.
        platform_mongo_password: <mongodb-itential-password>
        platform_mongo_url: mongodb://mongodb-data01.dc1.example.com:27017,mongodb-data02.dc1.example.com:27017,mongodb-data01.dc2.example.com:27017,mongodb-data02.dc2.example.com:27017,mongodb-arbiter01.dc3.example.com:27017/itential?replicaSet=rs0

        # The default Redis username is used.
        # platform_redis_username: itential

        # The Redis password and sentinels are overridden.
        platform_redis_password: <redis-itential-password>
        platform_redis_sentinels:
          - host: redis-sentinel01.dc1.example.com
            port: 26379
          - host: redis-sentinel01.dc2.example.com
            port: 26379
          - host: redis-sentinel01.dc3.example.com
            port: 26379

    gateway:
      hosts:
        itential-gateway01.dc1.example.com:
        itential-gateway01.dc2.example.com:
      vars:
        # The Gateway release must be defined.
        #  - valid values: 4.2, 4.3
        gateway_release: 4.3

        # The Gateway wheel file to install must be defined.
        gateway_whl_file: automation_gateway-<version>-py3-none-any.whl
