---
all:
  vars:
    platform_release: 6
    # Declare the purpose of the environment to help the verification stage check resources.
    # Possible values: "dev", "test", "prod"
    env: <env>

  children:
    redis_master:
      hosts:
        redis01.example.com:

    redis_replica:
      hosts:
        redis02.example.com:
        redis03.example.com:

    redis_sentinel:
      hosts:
        redis01.example.com:
        redis02.example.com:
        redis03.example.com:

    redis_data_nodes:
      hosts:
        redis01.example.com:
        redis02.example.com:
        redis03.example.com:
      vars:
        # NOTE: using Ansible Vault to encrypt passwords is highly recommended
        redis_user_admin_password: <admin-password>
        redis_user_itential_password: <itential-password>
        redis_user_repluser_password: <repluser-password>
        redis_user_sentineladmin_password: <sentineladmin-password>
        redis_user_sentineluser_password: <sentineluser-password>
        redis_user_prometheus_password: <prometheus-password>

    mongodb:
      hosts:
        mongodb01.example.com:
        mongodb02.example.com:
        mongodb03.example.com:
      vars:
        # NOTE: using Ansible Vault to encrypt passwords is highly recommended
        mongodb_user_admin_password: <admin-password>
        mongodb_user_itential_password: <itential-password>

    platform:
      hosts:
        platform01.example.com:
      vars:
        # open64-length hex string, representing a 256-bit AES encryption key
        # example command to generate key: 'openssl rand -hex 32'
        platform_encryption_key: <key>

        # NOTE: the platform packages list varies depending on entitlement
        platform_packages:
          - itential-platform-<version>.noarch.rpm

        # MongoDB connection
        platform_mongo_url: mongodb://itential:itential@mongodb01.example.com:27017,mongodb02.example.com:27017,mongodb03.example.com:27017/itential?replicaSet=rs0

        # Redis Sentinel connection
        platform_redis_sentinels:
          - host: redis01.example.com
            port: 26379
          - host: redis02.example.com
            port: 26379
          - host: redis03.example.com
            port: 26379

    gateway:
      hosts:
        gateway01.example.com:
      vars:
        gateway_release: 4.3
        gateway_whl_file: automation_gateway-<version>-py3-none-any.whl
