---
# In this example, Redis is installed and configured using the Remi YUM repository.
all:
  vars:
    # The Platform release must be defined.
    #  - valid values: 6, 6.0
    platform_release: 6

  children:
    redis_master:
      hosts:
        redis01.example.com:
      vars:
        # The Redis install from source variable is overridden.
        redis_install_from_source: false
