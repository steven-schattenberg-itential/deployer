---
# In this example, Redis is installed and configured using the system YUM repository (not Remi).
all:
  vars:
    # The Platform release must be defined.
    #  - valid values: 6, 6.0
    platform_release: 6

  children:
    redis_master:
      hosts:
        redis01.example.com:
      vars:
        # The Redis install from source variable is overridden.
        redis_install_from_source: false
        # The Redis packages are overridden.
        # NOTE: The Redis packages list will vary depending on OS.
        redis_packages:
          - redis

        # TLS is disabled in this example. Set redis_tls_enabled: true and
        # redis_pki_src_dir to enable TLS. See the tls_guide.md for details.
        redis_tls_enabled: false
