---
# In this example, Redis is installed and configured using the Redis source packages.
all:
  vars:
    # The Platform release must be defined.
    #  - valid values: 6, 6.0
    platform_release: 6

  children:
    redis_master:
      hosts:
        redis01.example.com:
      vars:
        # By default, Redis will be installed from source.
        # redis_install_from_source: true

        # TLS is disabled in this example. Set redis_tls_enabled: true and
        # redis_pki_src_dir to enable TLS. See the tls_guide.md for details.
        redis_tls_enabled: false
