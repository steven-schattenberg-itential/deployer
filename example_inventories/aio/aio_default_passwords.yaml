---
# In this example, the Deployer will install and configure Redis, MongoDB, Itential Platform
# and Itential Gateway4 in an All-In-One environment.
# Default Redis and MongoDB passwords will be used.
# TLS will be configured OFF.
all:
  vars:
    # The Platform release must be defined.
    #  - valid values: 6, 6.0
    platform_release: 6

  children:
    redis_master:
      hosts:
        host01.example.com:

    mongodb:
      hosts:
        host01.example.com:
      vars:
        # TLS and cert uploads are disabled.
        mongodb_tls_enabled: false
        mongodb_tls_copy_certs: false

    platform:
      hosts:
        host01.example.com:
      vars:
        # The Platform encryption key must be defined.
        # It is an open64-length hex string, representing a 256-bit AES encryption key.
        #  - example command to generate key: 'openssl rand -hex 32'
        platform_encryption_key: <key>

        # The Platform packages to install must be defined.
        # NOTE: The Platform packages list varies depending on entitlement.
        platform_packages:
          - itential-platform-<version>.noarch.rpm

        # The default MongoDB username, password, database and URL are used.
        # platform_mongo_user: itential
        # platform_mongo_password: itential
        # platform_mongo_db_name: itential
        # platform_mongo_url: mongodb://localhost:27017

        # MongoDB TLS is disabled.
        platform_mongo_tls_enabled: false

        # The default Redis username, password and host are used.
        # platform_redis_username: itential
        # platform_redis_password: itential
        # platform_redis_host: localhost

    gateway:
      hosts:
        host02.example.com:
      vars:
        # The Gateway release must be defined.
        #  - valid values: 4.2, 4.3
        gateway_release: 4.3

        # The Gateway wheel file to install must be defined.
        gateway_whl_file: automation_gateway-<version>-py3-none-any.whl
