---
# ============================================================================
# Create Platform PKI Directory Structure
# ============================================================================

- name: Prepare Platform PKI infrastructure
  when: platform_webserver_https_copy_certs | bool or platform_mongodb_copy_certs | bool
  tags:
    - platform
    - platform_certificates
    - certificates
  block:
    - name: Create Platform PKI base directory
      ansible.builtin.file:
        path: "{{ platform_pki_base_dir }}"
        state: directory
        owner: "{{ platform_pki_base_owner }}"
        group: "{{ platform_pki_base_group }}"
        mode: "0750"

    - name: Create Platform PKI subdirectories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ platform_pki_base_owner }}"
        group: "{{ platform_pki_base_group }}"
        mode: "0750"
      loop:
        - "{{ platform_pki_https_dir }}"
        - "{{ platform_mongodb_pki_dir }}"

    - name: Create Platform private key directory
      ansible.builtin.file:
        path: "{{ platform_pki_private_dir }}"
        state: directory
        owner: "{{ platform_pki_private_owner }}"
        group: "{{ platform_pki_private_group }}"
        mode: "0750"

# ============================================================================
# HTTPS Certificates
# ============================================================================

- name: Copy HTTPS key and cert files
  when: platform_webserver_https_copy_certs | bool
  tags:
    - platform
    - platform_certificates
    - platform_https
    - certificates
  block:
    - name: Ensure the HTTPS private key directory exists
      ansible.builtin.file:
        path: "{{ platform_https_key_dest | dirname }}"
        state: directory
        owner: "{{ platform_pki_private_owner }}"
        group: "{{ platform_pki_private_group }}"
        mode: "0750"

    - name: Ensure the HTTPS cert directory exists
      ansible.builtin.file:
        path: "{{ platform_https_cert_dest | dirname }}"
        state: directory
        owner: "{{ platform_pki_base_owner }}"
        group: "{{ platform_pki_base_group }}"
        mode: "0750"

    - name: Put the HTTPS key file in the correct location
      ansible.builtin.copy:
        src: "{{ platform_https_key_src }}"
        dest: "{{ platform_https_key_dest }}"
        mode: "0640"
        owner: "{{ platform_pki_private_owner }}"
        group: "{{ platform_pki_private_group }}"
      notify: restart itential-platform

    - name: Put the HTTPS cert file in the correct location
      ansible.builtin.copy:
        src: "{{ platform_https_cert_src }}"
        dest: "{{ platform_https_cert_dest }}"
        mode: "0644"
        owner: "{{ platform_user }}"
        group: "{{ platform_group }}"
      notify: restart itential-platform

# ============================================================================
# MongoDB Client Certificates
# ============================================================================

- name: Copy MongoDB root CA file to the appropriate location
  ansible.builtin.copy:
    src: "{{ platform_mongodb_ca_src }}"
    dest: "{{ platform_mongodb_ca_dest }}"
    mode: "0644"
    owner: "{{ platform_user }}"
    group: "{{ platform_group }}"
  when:
    - platform_mongodb_copy_certs | bool
    - platform_mongodb_ca_src is defined
  notify: restart itential-platform
  tags:
    - platform
    - platform_certificates
    - platform_mongodb
    - certificates
