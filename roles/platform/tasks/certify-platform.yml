# ============================================================================
# CONFIRM TLS FILES
# ============================================================================

- name: Check TLS certificate file exists
  ansible.builtin.stat:
    path: "{{ platform_webserver_https_cert.stdout }}"
  register: platform_webserver_https_cert_stat
  ignore_errors: true
  changed_when: false
  when: platform_webserver_https_cert.stdout

- name: Check TLS key file exists
  ansible.builtin.stat:
    path: "{{ platform_webserver_https_key.stdout }}"
  register: platform_webserver_https_key_stat
  ignore_errors: true
  changed_when: false
  when: platform_webserver_https_key.stdout

- name: Check HTTPS certificate file exists
  ansible.builtin.stat:
    path: "{{ platform_https_cert_dest }}"
  register: platform_https_cert_stat

- name: Check HTTPS private key file exists
  ansible.builtin.stat:
    path: "{{ platform_https_key_dest }}"
  register: platform_https_key_stat

- name: Check HTTPS CA certificate file exists
  ansible.builtin.stat:
    path: "{{ platform_https_ca_dest }}"
  register: platform_https_ca_stat

- name: Get PKI base directory info
  ansible.builtin.stat:
    path: "{{ platform_pki_base_dir }}"
  register: platform_pki_dir_stat

- name: Get HTTPS certificate validity dates
  ansible.builtin.command: openssl x509 -noout -dates -in {{ platform_https_cert_dest }}
  register: platform_https_cert_dates
  ignore_errors: true
  changed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Check if HTTPS certificate expires within 30 days
  ansible.builtin.command: openssl x509 -noout -checkend 2592000 -in {{ platform_https_cert_dest }}
  register: platform_https_cert_expiry_warn
  ignore_errors: true
  changed_when: false
  failed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Get HTTPS CA certificate validity dates
  ansible.builtin.command: openssl x509 -noout -dates -in {{ platform_https_ca_dest }}
  register: platform_https_ca_dates
  ignore_errors: true
  changed_when: false
  when: platform_https_ca_stat.stat.exists | default(false)

- name: Check if HTTPS CA certificate expires within 30 days
  ansible.builtin.command: openssl x509 -noout -checkend 2592000 -in {{ platform_https_ca_dest }}
  register: platform_https_ca_expiry_warn
  ignore_errors: true
  changed_when: false
  failed_when: false
  when: platform_https_ca_stat.stat.exists | default(false)

- name: Get HTTPS certificate subject
  ansible.builtin.command: openssl x509 -noout -subject -in {{ platform_https_cert_dest }}
  register: platform_https_cert_subject
  ignore_errors: true
  changed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Get HTTPS certificate serial number
  ansible.builtin.command: openssl x509 -noout -serial -in {{ platform_https_cert_dest }}
  register: platform_https_cert_serial
  ignore_errors: true
  changed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Get HTTPS certificate issuer
  ansible.builtin.command: openssl x509 -noout -issuer -in {{ platform_https_cert_dest }}
  register: platform_https_cert_issuer
  ignore_errors: true
  changed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Get HTTPS certificate signature algorithm
  ansible.builtin.shell: >
    openssl x509 -noout -text -in {{ platform_https_cert_dest }} |
    grep "Signature Algorithm" | head -1 | sed 's/.*Signature Algorithm: //'
  register: platform_https_cert_sig_alg
  ignore_errors: true
  changed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Get HTTPS certificate public key info
  ansible.builtin.shell: >
    openssl x509 -noout -text -in {{ platform_https_cert_dest }} |
    grep -E "Public Key Algorithm|RSA Public-Key:|Public-Key:" | head -3
  register: platform_https_cert_key_info
  ignore_errors: true
  changed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Get HTTPS certificate extended key usage
  ansible.builtin.shell: >
    openssl x509 -noout -ext extendedKeyUsage
    -in {{ platform_https_cert_dest }} 2>/dev/null || echo "Not present"
  register: platform_https_cert_eku
  ignore_errors: true
  changed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Get HTTPS certificate SANs
  ansible.builtin.shell: >
    openssl x509 -noout -ext subjectAltName
    -in {{ platform_https_cert_dest }} 2>/dev/null || echo "No SANs found"
  register: platform_https_cert_sans
  ignore_errors: true
  changed_when: false
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Check inventory_hostname in certificate SANs
  ansible.builtin.set_fact:
    platform_https_hostname_in_san: >-
      {{ (inventory_hostname | default('')) in
      ((platform_https_cert_sans | default({})).stdout | default('')) }}
  when:
    - platform_https_cert_sans is defined
    - platform_https_cert_sans.stdout is defined
    - platform_https_cert_sans.stdout != ''

- name: Check ansible_host IP in certificate SANs
  ansible.builtin.set_fact:
    platform_https_ip_in_san: >-
      {{ (ansible_host | default('')) in
      ((platform_https_cert_sans | default({})).stdout | default('')) }}
  when:
    - platform_https_cert_sans is defined
    - platform_https_cert_sans.stdout is defined
    - platform_https_cert_sans.stdout != ''
    - ansible_host is defined
    - ansible_host != inventory_hostname

- name: Get HTTPS certificate public key fingerprint
  ansible.builtin.shell: openssl x509 -pubkey -noout -in {{ platform_https_cert_dest }} | openssl md5
  register: platform_https_cert_pubkey_md5
  ignore_errors: true
  changed_when: false
  no_log: true
  when: platform_https_cert_stat.stat.exists | default(false)

- name: Get HTTPS private key public key fingerprint
  ansible.builtin.shell: openssl pkey -pubout -in {{ platform_https_key_dest }} | openssl md5
  register: platform_https_key_pubkey_md5
  ignore_errors: true
  changed_when: false
  no_log: true
  when: platform_https_key_stat.stat.exists | default(false)

- name: Determine cert-key pair match
  ansible.builtin.set_fact:
    platform_https_cert_key_match: >-
      {{ platform_https_cert_pubkey_md5.stdout == platform_https_key_pubkey_md5.stdout }}
  when:
    - platform_https_cert_pubkey_md5 is defined
    - platform_https_cert_pubkey_md5.rc | default(1) == 0
    - platform_https_key_pubkey_md5 is defined
    - platform_https_key_pubkey_md5.rc | default(1) == 0

- name: Validate HTTPS certificate chain against CA
  ansible.builtin.shell: >
    openssl verify -CAfile {{ platform_https_ca_dest }} {{ platform_https_cert_dest }}
  register: platform_https_cert_chain_valid
  ignore_errors: true
  changed_when: false
  when:
    - platform_https_cert_stat.stat.exists | default(false)
    - platform_https_ca_stat.stat.exists | default(false)

- name: Test live HTTPS TLS handshake
  ansible.builtin.shell: >
    echo | openssl s_client
    -connect {{ inventory_hostname }}:{{ platform_webserver_https_port.stdout }}
    -CAfile {{ platform_https_ca_dest }}
    -servername {{ inventory_hostname }} 2>&1 |
    grep -E "Verify return code|subject=|issuer="
  register: platform_https_tls_handshake
  ignore_errors: true
  changed_when: false
  when:
    - platform_webserver_https_enabled.stdout | default('false') | bool
    - platform_webserver_https_port.stdout | default('') != ''
    - platform_https_ca_stat.stat.exists | default(false)

