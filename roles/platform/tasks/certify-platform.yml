  when: platform_webserver_log_filename.stdout

# ============================================================================
# CONFIRM MONGODB CLIENT TLS
# ============================================================================

- name: Check MongoDB CA certificate file exists
  ansible.builtin.stat:
    path: "{{ platform_mongodb_ca_dest }}"
  register: platform_mongodb_ca_stat
  when: platform_mongo_tls_enabled.stdout | default('') | bool

- name: Get MongoDB CA certificate validity dates
  ansible.builtin.command: openssl x509 -noout -dates -in {{ platform_mongodb_ca_dest }}
  register: platform_mongodb_ca_dates
  ignore_errors: true
  changed_when: false
  when:
    - platform_mongo_tls_enabled.stdout | default('') | bool
    - platform_mongodb_ca_stat is defined
    - platform_mongodb_ca_stat.stat.exists | default(false)

- name: Check if MongoDB CA certificate expires within 30 days
  ansible.builtin.command: openssl x509 -noout -checkend 2592000 -in {{ platform_mongodb_ca_dest }}
  register: platform_mongodb_ca_expiry_warn
  ignore_errors: true
  changed_when: false
  failed_when: false
  when:
    - platform_mongo_tls_enabled.stdout | default('') | bool
    - platform_mongodb_ca_stat is defined
    - platform_mongodb_ca_stat.stat.exists | default(false)

- name: Get MongoDB CA certificate subject
  ansible.builtin.command: openssl x509 -noout -subject -in {{ platform_mongodb_ca_dest }}
  register: platform_mongodb_ca_subject
  ignore_errors: true
  changed_when: false
  when:
    - platform_mongo_tls_enabled.stdout | default('') | bool
    - platform_mongodb_ca_stat is defined
    - platform_mongodb_ca_stat.stat.exists | default(false)

- name: Get MongoDB CA certificate issuer
  ansible.builtin.command: openssl x509 -noout -issuer -in {{ platform_mongodb_ca_dest }}
  register: platform_mongodb_ca_issuer
  ignore_errors: true
  changed_when: false
  when:
    - platform_mongo_tls_enabled.stdout | default('') | bool
    - platform_mongodb_ca_stat is defined
    - platform_mongodb_ca_stat.stat.exists | default(false)

- name: Set MongoDB TLS check host
  ansible.builtin.set_fact:
    platform_mongo_tls_check_host: >-
      {{ groups['mongodb_primary'][0]
         if (groups['mongodb_primary'] is defined and groups['mongodb_primary'] | length > 0)
         else (groups['mongodb'][0]
               if (groups['mongodb'] is defined and groups['mongodb'] | length > 0)
               else 'localhost') }}
  when: platform_mongo_tls_enabled.stdout | default('') | bool

- name: Test live MongoDB TLS handshake using Platform CA
  ansible.builtin.shell: >
    echo | openssl s_client
    -connect {{ platform_mongo_tls_check_host }}:27017
    -CAfile {{ platform_mongodb_ca_dest }} 2>&1 |
    grep -E "Verify return code|subject=|issuer="
  register: platform_mongodb_tls_handshake
  ignore_errors: true
  changed_when: false
  when:
    - platform_mongo_tls_enabled.stdout | default('') | bool
    - platform_mongodb_ca_stat is defined
    - platform_mongodb_ca_stat.stat.exists | default(false)
    - platform_mongo_tls_check_host is defined

# ============================================================================
# GATHER HOST INFORMATION
# ============================================================================

- name: Gather host information
  itential.deployer.gather_host_information:
  register: platform_host_details

# ============================================================================
# GENERATE REPORT
# ============================================================================
- name: Generate Itential platform validation report
  ansible.builtin.template:
    src: platform-validation-report.md.j2
    dest: "{{ platform_certify_report_file }}"
    mode: '0644'
    owner: "{{ platform_user }}"
    group: "{{ platform_group }}"

- name: Copy validation report to the control node
  ansible.builtin.fetch:
    dest: "{{ platform_certify_report_dir_local }}/"
    fail_on_missing: false
    flat: true
    src: "{{ platform_certify_report_file }}"

- name: Display report summary
  ansible.builtin.debug:
    msg:
      - "Platform validation complete for {{ inventory_hostname }}"
      - "Overall Status: {{ 'PASSED ✓' if (platform_process is defined and platform_process.rc == 0) else 'FAILED ✗' }}"
      - "Remote report: {{ platform_certify_report_file }}"
      - "Local report:  {{ platform_certify_report_dir_local }}/{{ platform_certify_report_file | basename }}"
