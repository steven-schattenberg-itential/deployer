# ============================================================================
# CONFIRM CONNECTIVITY
# ============================================================================

- name: Initialize MongoDB and Redis connectivity flags
  ansible.builtin.set_fact:
    platform_mongodb_connection: false
    platform_redis_connection: false

- name: Check health status endpoint using HTTP
  ansible.builtin.uri:
    url: "http://{{ inventory_hostname }}:{{ platform_webserver_http_port.stdout }}/health/status"
    method: GET
    return_content: true
    status_code: 200
    validate_certs: false  # Set to 'no' for self-signed certs
    force: true
  register: platform_http_health_check
  ignore_errors: true
  changed_when: false
  failed_when: false
  when: platform_webserver_http_enabled.stdout | bool

- name: Check MongoDB connection (HTTP)
  ansible.builtin.set_fact:
    platform_mongodb_connection: "{{ (platform_http_health_check.json.services |
      selectattr('service', 'equalto', 'mongo') |
      selectattr('status', 'equalto', 'running') | list | length) > 0 }}"
  when:
    - platform_webserver_http_enabled.stdout | bool
    - platform_http_health_check.json is defined

- name: Check Redis connection (HTTP)
  ansible.builtin.set_fact:
    platform_redis_connection: "{{ (platform_http_health_check.json.services |
      selectattr('service', 'equalto', 'redis') |
      selectattr('status', 'equalto', 'running') | list | length) > 0 }}"
  when:
    - platform_webserver_http_enabled.stdout | bool
    - platform_http_health_check.json is defined

- name: Check health status endpoint using HTTPS
  ansible.builtin.uri:
    url: "https://{{ inventory_hostname }}:{{ platform_webserver_https_port.stdout }}/health/status"
    method: GET
    return_content: true
    status_code: 200
    validate_certs: false  # Set to 'no' for self-signed certs
    force: true
  register: platform_https_health_check
  ignore_errors: true
  changed_when: false
  failed_when: false
  when: platform_webserver_https_enabled.stdout | bool

- name: Check MongoDB connection (HTTPS)
  ansible.builtin.set_fact:
    platform_mongodb_connection: "{{ (platform_https_health_check.json.services |
      selectattr('service', 'equalto', 'mongo') |
      selectattr('status', 'equalto', 'running') | list | length) > 0 }}"
  when:
    - platform_webserver_https_enabled.stdout | bool
    - platform_https_health_check.json is defined

- name: Check Redis connection (HTTPS)
  ansible.builtin.set_fact:
    platform_redis_connection: "{{ (platform_https_health_check.json.services |
      selectattr('service', 'equalto', 'redis') |
      selectattr('status', 'equalto', 'running') | list | length) > 0 }}"
  when:
    - platform_webserver_https_enabled.stdout | bool
    - platform_https_health_check.json is defined

