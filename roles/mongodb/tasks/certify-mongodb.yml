---

- name: Set MongoDB auth connection options
  ansible.builtin.set_fact:
    mongodb_auth_args: "{{ '-u ' + mongodb_user_admin + ' -p ' + mongodb_user_admin_password +
      ' --authenticationDatabase admin' if mongodb_auth_enabled | bool else '' }}"

- name: Set MongoDB TLS connection options
  ansible.builtin.set_fact:
    mongodb_tls_args: "{{ '--tls --tlsCAFile ' + mongodb_tls_ca_dest if mongodb_tls_enabled | bool else '' }}"

- name: Set mongosh command
  ansible.builtin.set_fact:
    mongodb_mongosh_cmd: "mongosh --quiet --host {{ inventory_hostname }} {{ mongodb_auth_args }} {{ mongodb_tls_args }}"

- name: Ensure report directory exists
  ansible.builtin.file:
    path: "{{ mongodb_certify_report_dir_remote }}"
    state: directory
    owner: "{{ mongodb_owner }}"
    group: "{{ mongodb_group }}"
    mode: "0755"

- name: Set report filename
  ansible.builtin.set_fact:
    mongodb_certify_report_file: "{{ mongodb_certify_report_dir_remote }}/mongodb-report-{{ inventory_hostname }}.md"

- name: Check if MongoDB service exists
  ansible.builtin.systemd:
    name: mongod
  register: mongodb_service_status
  ignore_errors: true

- name: Check if MongoDB process is running
  ansible.builtin.shell: ps aux | grep -v grep | grep mongod
  register: mongodb_process
  ignore_errors: true
  changed_when: false

- name: Check MongoDB listening ports
  ansible.builtin.shell: ss -tulpn | grep mongod
  register: mongodb_ports
  ignore_errors: true
  changed_when: false

- name: Get MongoDB version
  ansible.builtin.shell: mongod --version | head -n 1
  register: mongodb_version
  ignore_errors: true
  changed_when: false

- name: Check MongoDB config file exists
  ansible.builtin.stat:
    path: /etc/mongod.conf
  register: mongodb_conf_file

- name: Get MongoDB config file permissions
  ansible.builtin.command: ls -la /etc/mongod.conf
  register: mongodb_conf_permissions
  ignore_errors: true
  changed_when: false
  when: mongodb_conf_file.stat.exists

- name: Read MongoDB configuration file
  ansible.builtin.slurp:
    src: /etc/mongod.conf
  register: mongodb_config_content
  when: mongodb_conf_file.stat.exists
  ignore_errors: true

- name: Parse MongoDB config for data directory
  ansible.builtin.shell: grep -E '^\s*dbPath:' /etc/mongod.conf | awk '{print $2}'
  register: mongodb_data_dir
  ignore_errors: true
  changed_when: false
  when: mongodb_conf_file.stat.exists

- name: Parse MongoDB config for log path
  ansible.builtin.shell: grep -E '^\s*path:' /etc/mongod.conf | awk '{print $2}'
  register: mongodb_log_path
  ignore_errors: true
  changed_when: false
  when: mongodb_conf_file.stat.exists

- name: Check MongoDB systemd unit file
  ansible.builtin.stat:
    path: /usr/lib/systemd/system/mongod.service
  register: mongodb_systemd_file

- name: Check data directory exists and permissions
  ansible.builtin.stat:
    path: "{{ mongodb_data_dir.stdout }}"
  register: mongodb_data_dir_stat
  ignore_errors: true
  when:
    - mongodb_data_dir.stdout is defined
    - mongodb_data_dir.stdout != ""

- name: Get data directory size
  ansible.builtin.command: du -sh {{ mongodb_data_dir.stdout }}
  register: mongodb_data_size
  ignore_errors: true
  changed_when: false
  when:
    - mongodb_data_dir.stdout is defined
    - mongodb_data_dir.stdout != ""

# ============================================================================
# CONNECTIVITY TESTS
# ============================================================================

- name: Test basic MongoDB connection
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "db.adminCommand('ping')" 2>&1
  register: mongodb_ping
  ignore_errors: true
  changed_when: false

# ============================================================================
# TLS/SSL CHECKS
# ============================================================================

- name: Check if TLS is enabled in config
  ansible.builtin.shell: |
    grep -E '^\s*mode:\s*requireTLS|^\s*mode:\s*preferTLS|^\s*mode:\s*allowTLS' /etc/mongod.conf
  register: mongodb_tls_mode
  ignore_errors: true
  changed_when: false
  when: mongodb_conf_file.stat.exists

- name: Check TLS server certificate file exists
  ansible.builtin.stat:
    path: "{{ mongodb_tls_cert_dest }}"
  register: mongodb_tls_cert_file_stat_result
  ignore_errors: true
  when: mongodb_tls_enabled | bool

- name: Check TLS CA certificate file exists
  ansible.builtin.stat:
    path: "{{ mongodb_tls_ca_dest }}"
  register: mongodb_tls_ca_file_stat_result
  ignore_errors: true
  when: mongodb_tls_enabled | bool

- name: Check replica set auth keyfile exists
  ansible.builtin.stat:
    path: "{{ mongodb_auth_key_dest }}"
  register: mongodb_auth_key_file_stat_result
  ignore_errors: true
  when: mongodb_tls_enabled | bool

- name: Get TLS server certificate expiration
  ansible.builtin.shell: |
    openssl x509 -in {{ mongodb_tls_cert_dest }} -noout -enddate
  register: mongodb_tls_cert_expiry
  ignore_errors: true
  changed_when: false
  when:
    - mongodb_tls_enabled | bool
    - mongodb_tls_cert_file_stat_result.stat.exists | default(false)

- name: Get TLS CA certificate expiration
  ansible.builtin.shell: |
    openssl x509 -in {{ mongodb_tls_ca_dest }} -noout -enddate
  register: mongodb_tls_ca_expiry
  ignore_errors: true
  changed_when: false
  when:
    - mongodb_tls_enabled | bool
    - mongodb_tls_ca_file_stat_result.stat.exists | default(false)

# ============================================================================
# SERVER STATUS AND METRICS
# ============================================================================

- name: Get MongoDB server status
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "EJSON.stringify(db.serverStatus(), null, null, {relaxed: true})"
  register: mongodb_server_status
  ignore_errors: true
  changed_when: false
  no_log: true

- name: Get MongoDB build info
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "JSON.stringify(db.serverBuildInfo())"
  register: mongodb_build_info
  ignore_errors: true
  changed_when: false
  no_log: true

# ============================================================================
# REPLICA SET STATUS
# ============================================================================

- name: Check if replica set is configured
  ansible.builtin.shell: |
    grep -E '^\s*replSetName:' /etc/mongod.conf | awk '{print $2}'
  register: mongodb_replset_name
  ignore_errors: true
  changed_when: false
  when: mongodb_conf_file.stat.exists

- name: Get replica set status
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "JSON.stringify(rs.status())"
  register: mongodb_replset_status
  ignore_errors: true
  changed_when: false
  no_log: true
  when:
    - mongodb_replset_name.stdout is defined
    - mongodb_replset_name.stdout != ""

- name: Get replica set configuration
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "JSON.stringify(rs.conf())"
  register: mongodb_replset_config
  ignore_errors: true
  changed_when: false
  no_log: true
  when:
    - mongodb_replset_name.stdout is defined
    - mongodb_replset_name.stdout != ""

- name: Get replica set member details
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "JSON.stringify(rs.isMaster())"
  register: mongodb_replset_ismaster
  ignore_errors: true
  changed_when: false
  no_log: true
  when:
    - mongodb_replset_name.stdout is defined
    - mongodb_replset_name.stdout != ""

# ============================================================================
# USER AUTHENTICATION TESTS
# ============================================================================

- name: Get list of MongoDB users
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} admin --eval 'JSON.stringify(db.system.users.find({}, { user: 1, db: 1, roles: 1 }).toArray())'
  register: mongodb_users_list
  ignore_errors: true
  changed_when: false
  no_log: true

- name: Parse MongoDB users
  ansible.builtin.set_fact:
    mongodb_users: "{{ mongodb_users_list.stdout | from_json | default([]) }}"
  when:
    - mongodb_users_list is defined
    - mongodb_users_list.rc == 0
    - mongodb_users_list.stdout is defined
  failed_when: false

# Test individual users
- name: Test connection with itential user
  ansible.builtin.shell: |
    mongosh --quiet {{ mongodb_tls_args }} --host {{ inventory_hostname }} \
    -u {{ mongodb_user_itential }} -p {{ mongodb_user_itential_password }} \
    --authenticationDatabase itential --eval "db.adminCommand('ping')"
  register: mongodb_user_itential_ping
  ignore_errors: true
  changed_when: false
  # no_log: true
  when:
    - mongodb_user_itential is defined
    - mongodb_user_itential_password is defined

- name: Test connection with monitor user
  ansible.builtin.shell: |
    mongosh --quiet {{ mongodb_tls_args }} --host {{ inventory_hostname }} \
    -u monitor -p {{ mongodb_user_monitor_password }} \
    --authenticationDatabase admin --eval "db.adminCommand('ping')"
  register: mongodb_user_monitor_ping
  ignore_errors: true
  changed_when: false
  when:
    - mongodb_monitor_user_enabled | bool
    - mongodb_user_monitor_password is truthy

# ============================================================================
# DATABASE INFORMATION
# ============================================================================

- name: List all databases
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "EJSON.stringify(db.adminCommand('listDatabases'), null, null, {relaxed: true})"
  register: mongodb_databases
  ignore_errors: true
  changed_when: false
  no_log: true

- name: Get database stats
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "EJSON.stringify(db.stats(), null, null, {relaxed: true})"
  register: mongodb_db_stats
  ignore_errors: true
  changed_when: false
  no_log: true

# ============================================================================
# LOGS
# ============================================================================

- name: Get recent MongoDB log entries
  ansible.builtin.shell: |
    if [ -f "{{ mongodb_log_path.stdout }}" ]; then
      tail -n 100 {{ mongodb_log_path.stdout }}
    else
      journalctl -u mongod -n 100 --no-pager
    fi
  register: mongodb_logs
  ignore_errors: true
  changed_when: false
  when: mongodb_log_path.stdout is defined or mongodb_service_status.status is defined

# ============================================================================
# SECURITY CHECKS
# ============================================================================

- name: Check if authentication is enabled
  ansible.builtin.shell: |
    grep -E '^\s*authorization:\s*enabled' /etc/mongod.conf
  register: mongodb_auth_enabled
  ignore_errors: true
  changed_when: false
  when: mongodb_conf_file.stat.exists

- name: Check security settings
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "JSON.stringify(db.adminCommand({getCmdLineOpts: 1}))"
  register: mongodb_security_settings
  ignore_errors: true
  changed_when: false
  no_log: true

# ============================================================================
# PERFORMANCE METRICS
# ============================================================================

- name: Get current operations
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "JSON.stringify(db.currentOp())"
  register: mongodb_current_ops
  ignore_errors: true
  changed_when: false
  no_log: true

- name: Get connection count
  ansible.builtin.shell: |
    {{ mongodb_mongosh_cmd }} --eval "db.serverStatus().connections"
  register: mongodb_connections
  ignore_errors: true
  changed_when: false
  no_log: true

# ============================================================================
# GATHER HOST INFORMATION
# ============================================================================

- name: Gather host information
  itential.deployer.gather_host_information:
  register: mongodb_host_details

# ============================================================================
# GENERATE REPORT
# ============================================================================
- name: Generate MongoDB validation report
  ansible.builtin.template:
    backup: true
    dest: "{{ mongodb_certify_report_file }}"
    src: mongodb-validation-report.md.j2
    group: "{{ mongodb_group }}"
    owner: "{{ mongodb_owner }}"
    mode: '0644'

- name: Copy validation report to the control node
  ansible.builtin.fetch:
    dest: "{{ mongodb_certify_report_dir_local }}/"
    fail_on_missing: false
    flat: true
    src: "{{ mongodb_certify_report_file }}"

- name: Display report summary
  ansible.builtin.debug:
    msg:
      - "MongoDB validation complete for {{ inventory_hostname }}"
      - "Overall Status: {{ 'PASSED ✓' if (mongodb_process is defined and mongodb_process.rc == 0) else 'FAILED ✗' }}"
      - "Report saved to: {{ mongodb_certify_report_file }} on both the remote and control nodes."
