---
# The location of the Redis binary
# redis_bin_dir: /usr/bin
redis_bin_dir: "{{ redis_install_from_source | bool | ternary('/usr/local/bin', '/usr/bin') }}"

# The location of the Redis config file
redis_conf_dir: "{{ redis_conf_dir_default }}"
redis_conf_file: "{{ redis_conf_dir }}/redis.conf"

# The location of the Redis log file
redis_log_dir: "{{ redis_log_dir_default }}"
redis_log: "{{ redis_log_dir }}/redis.log"

# The name of the Redis data file
redis_db_filename: dump.rdb

# The location of the Redis data directory
redis_data_dir: "{{ redis_data_dir_default }}"

# Redis user and group
redis_owner: redis
redis_group: redis

# Default redis port
redis_port: "{{ redis_port_default }}"

# Bind to localhost + private network interface
redis_bind: 127.0.0.1 {{ ansible_default_ipv4.address }}

# Feature flags that can be overridden in the hosts file
# Essentially, a default installation will have auth, but not tls
redis_auth_enabled: true
redis_tls_enabled: false

# Replication settings
redis_replicaof: "{{ groups['redis_master'][0] }} {{ redis_port }}"

# Redis replica priority for Sentinel failover
# Lower values = higher priority (more likely to be promoted)
# Set to 'auto' to calculate based on position, or specify explicit value (0-100)
# 0 = never promote this replica
redis_replica_priority: auto

# Default redis user passwords
# These are meant to be changed by the customer. By default they are meant to
# be predictable and simple.
redis_user_admin_password: admin
redis_user_itential_password: itential
redis_user_repluser_password: repluser
redis_user_sentineladmin_password: admin
redis_user_sentineluser_password: sentineluser
redis_user_prometheus_password: prometheus

# By default the prometheus user will not be created. If set to true, the prometheus user will be
# created with the appropriate ACL to allow the Redis exporter to work.
redis_prometheus_user_enabled: false

# Redis TLS configuration options
redis_tls_port: "{{ redis_tls_port_default }}"
redis_tls_auth_clients: "no"
redis_tls_protocols: "TLSv1.2 TLSv1.3"

# Redis memory sizing defaults (dedicated Redis node)

# If set to "auto", maxmemory is calculated from system RAM.
# If set to a number (bytes), that value is used verbatim.
redis_maxmemory_bytes: auto

# Used only when redis_maxmemory_bytes == "auto"
redis_maxmemory_ratio: 0.60
redis_maxmemory_min_mb: 512

# Default location for the certification report files
redis_certify_report_dir_remote: /var/tmp/itential-reports/redis
redis_certify_report_dir_local: /tmp/itential-reports/redis
