---
- name: Create Redis PKI base directory
  ansible.builtin.file:
    path: "{{ redis_pki_base_dir }}"
    state: directory
    owner: "{{ redis_pki_owner }}"
    group: "{{ redis_pki_group }}"
    mode: "0750"
  tags:
    - redis
    - redis_certificates
    - certificates

- name: Create Redis private directory
  ansible.builtin.file:
    path: "{{ redis_pki_private_dir }}"
    state: directory
    owner: "{{ redis_pki_owner }}"
    group: "{{ redis_pki_group }}"
    mode: "0700"
  tags:
    - redis
    - redis_certificates
    - certificates

- name: Copy Sentinel TLS certificate
  ansible.builtin.copy:
    src: "{{ redis_sentinel_tls_cert_src }}"
    dest: "{{ redis_sentinel_tls_cert_dest }}"
    owner: "{{ redis_pki_owner }}"
    group: "{{ redis_pki_group }}"
    mode: "0644"
  when: redis_sentinel_tls_cert_src | length > 0
  notify: Enable and Start Redis Sentinel
  tags:
    - redis
    - redis_certificates
    - certificates

- name: Copy Sentinel TLS private key
  ansible.builtin.copy:
    src: "{{ redis_sentinel_tls_key_src }}"
    dest: "{{ redis_sentinel_tls_key_dest }}"
    owner: "{{ redis_pki_owner }}"
    group: "{{ redis_pki_group }}"
    mode: "0600"
  when: redis_sentinel_tls_key_src | length > 0
  notify: Enable and Start Redis Sentinel
  tags:
    - redis
    - redis_certificates
    - certificates

- name: Copy CA bundle for Sentinel
  ansible.builtin.copy:
    src: "{{ redis_tls_ca_src }}"
    dest: "{{ redis_tls_ca_dest }}"
    owner: "{{ redis_pki_owner }}"
    group: "{{ redis_pki_group }}"
    mode: "0644"
  when: redis_tls_ca_src | length > 0
  notify: Enable and Start Redis Sentinel
  tags:
    - redis
    - redis_certificates
    - certificates
